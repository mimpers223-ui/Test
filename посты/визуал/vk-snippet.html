<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 1120px; height: 630px; overflow: hidden; font-family: 'Inter', -apple-system, Arial, sans-serif; }
  .hero {
    width: 1120px; height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  /* Decorative circles */
  .circle {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .c1 { width: 400px; height: 400px; top: -100px; right: -100px; }
  .c2 { width: 300px; height: 300px; bottom: -80px; left: -80px; background: rgba(59,130,246,0.15); }
  .c3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(255,255,255,0.03); }

  .content { position: relative; z-index: 2; text-align: center; padding: 0 80px; }
  .badge {
    display: inline-block; padding: 8px 20px;
    background: rgba(59,130,246,0.3); border: 1px solid rgba(96,165,250,0.5);
    border-radius: 100px; font-size: 18px; font-weight: 600; color: #93c5fd;
    margin-bottom: 24px; letter-spacing: 1px;
  }
  h1 { font-size: 88px; font-weight: 900; line-height: 1; margin-bottom: 18px; letter-spacing: -2px; }
  .gradient {
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub { font-size: 32px; color: #cbd5e1; margin-bottom: 36px; font-weight: 300; }
  .stats { display: flex; gap: 24px; justify-content: center; }
  .stat {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 16px 28px; border-radius: 16px;
  }
  .stat-n { font-size: 36px; font-weight: 900; color: #60a5fa; }
  .stat-l { font-size: 14px; color: #94a3b8; margin-top: 2px; }
</style>
</head>
<body>
<div class="hero">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="content">
    <div class="badge">⛽ НАРОДНАЯ КАРТА АЗС</div>
    <h1><span class="gradient">Бензин рядом</span></h1>
    <div class="sub">Где есть бензин прямо сейчас</div>
    <div class="stats">
      <div class="stat"><div class="stat-n">27K+</div><div class="stat-l">АЗС в базе</div></div>
      <div class="stat"><div class="stat-n">+570</div><div class="stat-l">отчётов/час</div></div>
      <div class="stat"><div class="stat-n">16</div><div class="stat-l">городов-миллионников</div></div>
    </div>
  </div>
</div>
</body>
</html>
