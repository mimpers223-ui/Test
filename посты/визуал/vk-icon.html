<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 576px; height: 576px; overflow: hidden; background: #1d4ed8; }
  .icon {
    width: 576px; height: 576px;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 50%, #1e3a8a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    border-radius: 108px;
  }
  .brand {
    width: 280px; height: 280px;
    background: rgba(255,255,255,0.12);
    border-radius: 60px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.2);
    margin-bottom: 24px;
  }
  .pump {
    font-size: 200px;
    line-height: 1;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  }
  .name {
    font-family: 'Inter', -apple-system, Arial, sans-serif;
    font-size: 60px; font-weight: 900; color: #fff;
    letter-spacing: -2px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div class="icon">
  <div class="brand"><div class="pump">⛽</div></div>
  <div class="name">Бензин</div>
</div>
</body>
</html>
