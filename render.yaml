# Render Blueprint (FREE tier) — Бензин рядом
# 100% бесплатный стек: Render Free + Supabase Free + Vercel Free + UptimeRobot Free
#
# ⚠️ Render Free Web Service засыпает через 15 мин idle.
# Чтобы не засыпал — используй UptimeRobot (https://uptimerobot.com, free):
#   пингует https://benzin-api.onrender.com/api/health каждые 5 мин.
#
# Деплой:
# 1. Создай репо на GitHub и залей код
# 2. Создай проект на https://supabase.com (free), примени db/schema.sql
# 3. Render → New → Blueprint → выбери репо → apply
# 4. Задай секреты: BOT_TOKEN, DATABASE_URL, MINI_APP_URL
# 5. Подожди ~3 мин → API будет на https://benzin-api.onrender.com
# 6. UptimeRobot → Add Monitor → https://benzin-api.onrender.com/api/health, interval 5 min
# 7. Vercel → Import → mini-app → env: VITE_API_URL=https://benzin-api.onrender.com

services:
  - type: web
    name: benzin-api
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd bot && python main.py
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8080
      - key: USE_SQLITE
        value: "false"
      - key: SUBSCRIBE_CHANNEL_TG
        value: "benzyn_ryadom"
      - key: SUBSCRIBE_COMMUNITY_VK
        value: "239975253"
      # === Секреты задаются вручную в Render Dashboard ===
      # DATABASE_URL - из Supabase Settings → Database → Connection string
      # BOT_TOKEN - от @BotFather
      # ADMIN_USERNAMES=darkt30
      # MINI_APP_URL=https://benzin-mini.vercel.app
      # CHANNEL_CHAT_ID=-100xxx (опционально)

  # === Cron Job: обновление данных каждый час ===
  - type: cron
    name: benzin-parser-cron
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd scripts && python orchestrator.py --once
    schedule: "0 * * * *"  # каждый час
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: USE_SQLITE
        value: "false"
      - key: SKIP_TG
        value: "false"
      # === Секреты наследуются от web service автоматически ===
      # DATABASE_URL, BOT_TOKEN, CHANNEL_CHAT_ID
      # TG_API_ID, TG_API_HASH — задать вручную в Render Dashboard (секреты)

  # === Cron Job: мониторинг свежести данных каждые 2 часа ===
  - type: cron
    name: benzin-monitor
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd scripts && python monitor_freshness.py
    schedule: "0 */2 * * *"  # каждые 2 часа
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: USE_SQLITE
        value: "false"
      # ADMIN_CHAT_ID — chat_id админа для alert'ов (задать вручную)
      # BOT_TOKEN — от @BotFather (наследуется)
