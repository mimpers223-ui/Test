name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -r requirements.txt
      - name: Smoke import
        run: |
          python -c "import sys; sys.path.insert(0, 'bot'); import handlers, api, db, push_worker, channel_poster; print('OK all imports')"
      - name: Mini App build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mini-app/package-lock.json
      - run: cd mini-app && npm ci && npm run build
